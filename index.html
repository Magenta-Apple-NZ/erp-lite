<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.95"/>
                <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.95"/>
                <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.95"/>
                <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.4"/>
            </svg>
            <span>Business Hub</span>
        </div>

        <nav class="sidebar-nav">
            <span class="nav-section-label">Workspace</span>

            <a class="nav-item active" href="#" id="nav-dashboard">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1.5" y="1.5" width="5" height="5" rx="1"/>
                    <rect x="9.5" y="1.5" width="5" height="5" rx="1"/>
                    <rect x="1.5" y="9.5" width="5" height="5" rx="1"/>
                    <rect x="9.5" y="9.5" width="5" height="5" rx="1"/>
                </svg>
                Dashboard
            </a>

            <a class="nav-item nav-item--soon" href="#" data-phase="Phase 1">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 2h7a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5l2-3z"/>
                    <line x1="5" y1="6" x2="11" y2="6"/>
                    <line x1="5" y1="9" x2="9" y2="9"/>
                </svg>
                Orders
                <span class="nav-soon-badge">Soon</span>
            </a>

            <a class="nav-item nav-item--soon" href="#" data-phase="Phase 2">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 6l7-4 7 4v7a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6z"/>
                    <rect x="5.5" y="9" width="5" height="5" rx="0.5"/>
                </svg>
                Warehouse
                <span class="nav-soon-badge">Soon</span>
            </a>

            <a class="nav-item nav-item--soon" href="#" data-phase="Phase 4">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1.5" y="1.5" width="13" height="13" rx="1.5"/>
                    <line x1="4.5" y1="5.5" x2="11.5" y2="5.5"/>
                    <line x1="4.5" y1="8" x2="11.5" y2="8"/>
                    <line x1="4.5" y1="10.5" x2="8.5" y2="10.5"/>
                </svg>
                Dispatch Log
                <span class="nav-soon-badge">Soon</span>
            </a>

            <a class="nav-item nav-item--soon" href="#" data-phase="Phase 5">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 11h3l2-7 3 5 2-3 2 5h2"/>
                </svg>
                Imports
                <span class="nav-soon-badge">Soon</span>
            </a>

            <a class="nav-item" href="#" id="nav-admin">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="8" r="2"/>
                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/>
                </svg>
                Catalogue
            </a>
        </nav>

        <div class="sidebar-currencies">
            <span class="nav-section-label">FX Rates</span>
            <div id="header-currencies"></div>
        </div>

        <div class="sidebar-admin">
            <span class="nav-section-label">Admin</span>

            <button id="edit-btn" class="sidebar-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 2l3 3-8 8H3v-3l8-8z"/>
                </svg>
                <span class="sidebar-btn-label">Edit Layout</span>
            </button>

            <button id="export-btn" class="sidebar-btn" style="display:none">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 2v8m-3-3l3 3 3-3"/>
                    <path d="M2 12v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-1"/>
                </svg>
                <span class="sidebar-btn-label">Export Config</span>
            </button>

            <button id="reset-btn" class="sidebar-btn sidebar-btn--danger" style="display:none">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 8a6 6 0 1 1 1.5 4"/>
                    <polyline points="2,11 2,14 5,14"/>
                </svg>
                <span class="sidebar-btn-label">Reset</span>
            </button>

            <button id="reload-btn" class="sidebar-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13.5 8a5.5 5.5 0 1 1-1.1-3.3"/>
                    <polyline points="13.5,2 13.5,5 10.5,5"/>
                </svg>
                <span class="sidebar-btn-label">Reload</span>
            </button>
        </div>
    </aside>

    <!-- ── Main ── -->
    <div class="main-wrap">

        <!-- Dashboard topbar (hidden in orders views) -->
        <div class="topbar" id="dashboard-topbar">
            <input type="text" id="search" placeholder="Search links, files, and tools…" autocomplete="off">
            <span id="last-updated"></span>
        </div>

        <!-- ── View: Dashboard ── -->
        <div id="view-dashboard" class="app-view">
            <section id="pinned-section" class="pinned-section" style="display:none">
                <h2 class="pinned-heading">Pinned</h2>
                <div id="pinned-items" class="pinned-items"></div>
            </section>
            <main id="dashboard"></main>
        </div>

        <!-- ── View: Orders list ── -->
        <div id="view-orders" class="app-view" style="display:none">
            <div class="orders-view-inner" id="orders-list-container"></div>
        </div>

        <!-- ── View: New order ── -->
        <div id="view-orders-new" class="app-view" style="display:none">
            <div class="orders-view-inner" id="orders-new-container"></div>
        </div>

        <!-- ── View: Order detail ── -->
        <div id="view-orders-detail" class="app-view" style="display:none">
            <div class="orders-view-inner" id="orders-detail-container"></div>
        </div>

        <!-- ── View: Admin / Catalogue ── -->
        <div id="view-admin" class="app-view" style="display:none">
            <div class="orders-view-inner" id="admin-container"></div>
        </div>

    </div>

</div>

<!-- ── Item edit modal ── -->
<div id="item-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <h3 class="modal-title">Edit Item</h3>
        <div class="modal-field">
            <label>Label</label>
            <input type="text" id="modal-label" placeholder="Display name">
        </div>
        <div class="modal-field">
            <label>Type</label>
            <select id="modal-type">
                <option value="link">Link (URL)</option>
                <option value="file">File</option>
                <option value="folder">Folder</option>
            </select>
        </div>
        <div class="modal-field" id="modal-url-field">
            <label>URL</label>
            <input type="url" id="modal-url" placeholder="https://…">
        </div>
        <div class="modal-field" id="modal-path-field" style="display:none">
            <label>Path</label>
            <input type="text" id="modal-path" placeholder="/Users/…">
        </div>
        <div class="modal-field">
            <label>Tag <span class="modal-hint">optional</span></label>
            <input type="text" id="modal-tag" placeholder="e.g. transition">
        </div>
        <div class="modal-field">
            <label>Season <span class="modal-hint">optional — e.g. oct-mar</span></label>
            <input type="text" id="modal-season" placeholder="e.g. oct-mar">
        </div>
        <div class="modal-actions">
            <button id="modal-save" class="btn-primary">Save</button>
            <button id="modal-cancel" class="btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<script src="orders.js"></script>
<script src="admin.js"></script>
<script src="app.js"></script>
</body>
</html>
