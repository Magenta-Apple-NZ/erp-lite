<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
<div class="app-shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="enviroware_logo_clean.png" alt="Enviroware" class="sidebar-logo">
            <div class="sidebar-brand-row">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                    <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.95"/>
                    <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.95"/>
                    <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.95"/>
                    <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.4"/>
                </svg>
                <span>Business Hub</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <span class="nav-section-label nav-item--admin-only">Workspace</span>

            <a class="nav-item active nav-item--admin-only" href="#" id="nav-dashboard">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1.5" y="1.5" width="5" height="5" rx="1"/>
                    <rect x="9.5" y="1.5" width="5" height="5" rx="1"/>
                    <rect x="1.5" y="9.5" width="5" height="5" rx="1"/>
                    <rect x="9.5" y="9.5" width="5" height="5" rx="1"/>
                </svg>
                Dashboard
            </a>

            <span class="nav-section-label">Business</span>

            <a class="nav-item" href="#orders" id="nav-orders">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 2h7a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5l2-3z"/>
                    <line x1="5" y1="6" x2="11" y2="6"/>
                    <line x1="5" y1="9" x2="9" y2="9"/>
                </svg>
                Orders
            </a>


            <a class="nav-item" href="#payslips" id="nav-payslips">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="1" width="12" height="14" rx="1"/>
                    <line x1="5" y1="5" x2="11" y2="5"/>
                    <line x1="5" y1="8" x2="11" y2="8"/>
                    <line x1="5" y1="11" x2="8" y2="11"/>
                </svg>
                Payslips
            </a>

            <a class="nav-item nav-item--soon nav-item--admin-only" href="#" data-phase="Phase 5">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 4.5h8v6.5H1z"/>
                    <path d="M9 7h3l2 2.2v1.8H9z"/>
                    <circle cx="4" cy="12.5" r="1.3"/>
                    <circle cx="12" cy="12.5" r="1.3"/>
                </svg>
                Imports
                <span class="nav-soon-badge">Soon</span>
            </a>

            <a class="nav-item nav-item--soon nav-item--admin-only" href="#" data-phase="Sales">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 12 5 7 9 10 13 4 15 6"/>
                    <polyline points="11 4 15 4 15 8"/>
                </svg>
                Sales History
                <span class="nav-soon-badge">Soon</span>
            </a>

            <a class="nav-item nav-item--admin-only" href="#calendar" id="nav-calendar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1.5" y="2.5" width="13" height="12" rx="1.5"/>
                    <line x1="1.5" y1="6.5" x2="14.5" y2="6.5"/>
                    <line x1="5" y1="1" x2="5" y2="4"/>
                    <line x1="11" y1="1" x2="11" y2="4"/>
                    <line x1="4.5" y1="10" x2="6.5" y2="10"/>
                    <line x1="9.5" y1="10" x2="11.5" y2="10"/>
                </svg>
                Calendar
            </a>

            <a class="nav-item nav-item--admin-only" href="#" id="nav-admin">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="8" r="2"/>
                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/>
                </svg>
                Catalogue
            </a>
        </nav>

        <div class="sidebar-version">v25.04.25.5</div>

        <div class="sidebar-admin nav-item--admin-only">
            <span class="nav-section-label">Admin</span>

            <button id="reload-btn" class="sidebar-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13.5 8a5.5 5.5 0 1 1-1.1-3.3"/>
                    <polyline points="13.5,2 13.5,5 10.5,5"/>
                </svg>
                <span class="sidebar-btn-label">Reload</span>
            </button>
        </div>
    </aside>

    <!-- ── Main ── -->
    <div class="main-wrap">

        <!-- Dashboard topbar (hidden in orders views) -->
        <div class="topbar" id="dashboard-topbar">
            <input type="text" id="search" placeholder="Search links, files, and tools…" autocomplete="off" style="display:none">
            <span id="last-updated"></span>
        </div>

        <!-- ── View: Dashboard ── -->
        <div id="view-dashboard" class="app-view">
            <div id="db-widgets"></div>
        </div>

        <!-- ── View: Orders list ── -->
        <div id="view-orders" class="app-view" style="display:none">
            <div class="orders-view-inner" id="orders-list-container"></div>
        </div>

        <!-- ── View: New order ── -->
        <div id="view-orders-new" class="app-view" style="display:none">
            <div class="orders-view-inner" id="orders-new-container"></div>
        </div>

        <!-- ── View: Order detail ── -->
        <div id="view-orders-detail" class="app-view" style="display:none">
            <div class="orders-view-inner" id="orders-detail-container"></div>
        </div>

        <!-- ── View: Edit order ── -->
        <div id="view-orders-edit" class="app-view" style="display:none">
            <div class="orders-view-inner" id="orders-edit-container"></div>
        </div>

        <!-- ── View: Warehouse ── -->
        <div id="view-warehouse" class="app-view" style="display:none">
            <div class="orders-view-inner" id="warehouse-container"></div>
        </div>

        <!-- ── View: Admin / Catalogue ── -->
        <div id="view-admin" class="app-view" style="display:none">
            <div class="orders-view-inner" id="admin-container"></div>
        </div>

        <!-- ── View: Imports ── -->
        <div id="view-imports" class="app-view" style="display:none">
            <div class="orders-view-inner" id="imports-container"></div>
        </div>

        <!-- ── View: Payslips ── -->
        <div id="view-payslips" class="app-view" style="display:none">
            <div class="orders-view-inner" id="payslips-container"></div>
        </div>

        <!-- ── View: Sales History ── -->
        <div id="view-sales" class="app-view" style="display:none">
            <div class="orders-view-inner" id="sales-container"></div>
        </div>

        <!-- ── View: Calendar ── -->
        <div id="view-calendar" class="app-view" style="display:none">
            <div class="orders-view-inner" id="calendar-container"></div>
        </div>

    </div>

</div>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
<script src="orders.js"></script>
<script src="admin.js"></script>
<script src="warehouse.js"></script>
<script src="imports.js"></script>
<script src="payslips.js"></script>
<script src="sales.js"></script>
<script src="calendar.js"></script>
<script src="app.js"></script>
</body>
</html>
