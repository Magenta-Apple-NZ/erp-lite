<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>Business Hub</h1>
            <div class="header-actions">
                <span id="last-updated" title="Last config load time"></span>
                <button id="reload-btn" title="Reload config">&#x21bb;</button>
            </div>
        </div>
        <input type="text" id="search" placeholder="Search links, files, and tools..." autocomplete="off">
        <div id="header-currencies" class="header-currencies"></div>
    </header>
    <section id="pinned-section" class="pinned-section" style="display:none;">
        <h2 class="pinned-heading">Pinned</h2>
        <div id="pinned-items" class="pinned-items"></div>
    </section>
    <main id="dashboard">
        <!-- Groups will be loaded here -->
    </main>
    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
